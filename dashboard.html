<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Landslide Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-brand">🌍 Landslide Intelligence</div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="dashboard.html" class="nav-link active">Dashboard</a>
    <a href="live.html" class="nav-link">Live Radar</a>
    <a href="database.html" class="nav-link">Database Log</a>
  </div>
</nav>

<!-- LOADER -->
<div id="loader">
  <div class="ld-title">📊 Analytics Dashboard</div>
  <div class="ld-track"><div class="ld-fill" id="lbar"></div></div>
  <div class="ld-sub" id="lsub">Fetching dataset...</div>
</div>

<div class="dashboard-container">
    
    <!-- PREDICTION PANEL -->
    <div class="predict-panel">
        <h2>Live Risk Prediction</h2>
        <form id="predictForm">
            <div class="section-label">🌧️ Terrain &amp; Environment</div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Rainfall 30d (mm)</label>
                    <input type="number" id="pred-rain" step="0.1" value="150" required>
                </div>
                <div class="input-group">
                    <label>Slope Angle (°)</label>
                    <input type="number" id="pred-slope" step="0.1" value="35" required>
                </div>
                <div class="input-group">
                    <label>Elevation (m)</label>
                    <input type="number" id="pred-elev" step="1" value="1200" required>
                </div>
                <div class="input-group">
                    <label>NDVI (Vegetation)</label>
                    <input type="number" id="pred-ndvi" step="0.01" value="0.25" required>
                </div>
                <div class="input-group">
                    <label>Soil Moisture / Clay %</label>
                    <input type="number" id="pred-soil" step="0.1" value="30.0" required>
                </div>
            </div>

            <div class="section-label" style="margin-top:18px;">🌍 Seismic Parameters</div>
            <div class="input-grid">
                <div class="input-group">
                    <label>Magnitude (Mw)</label>
                    <input type="number" id="pred-mag" step="0.1" min="0" max="10" value="0.0" required>
                </div>
                <div class="input-group">
                    <label>Depth (km)</label>
                    <input type="number" id="pred-depth" step="0.1" min="0" value="10.0" required>
                </div>
                <div class="input-group">
                    <label>PGA (g)</label>
                    <input type="number" id="pred-pga" step="0.01" min="0" max="2" value="0.0" required>
                </div>
                <div class="input-group">
                    <label>MMI Intensity</label>
                    <input type="number" id="pred-mmi" step="0.1" min="1" max="12" value="1" required>
                </div>
            </div>
            <button type="submit" class="predict-btn" id="predictBtn">Evaluate Risk</button>
        </form>
        
        <div id="predictResult" class="predict-result">
            <!-- Results injected here via JS -->
        </div>
    </div>

    <!-- CHARTS -->
    <div class="chart-card">
        <h2>Landslides over Time</h2>
        <div class="chart-container">
            <canvas id="timeChart"></canvas>
        </div>
    </div>
    
    <div class="chart-card" style="flex-basis: 300px;">
        <h2>Risk Distribution</h2>
        <div class="chart-container">
            <canvas id="riskChart"></canvas>
        </div>
    </div>
    
    <div class="chart-card">
        <h2>Region-wise Events</h2>
        <div class="chart-container">
            <canvas id="regionChart"></canvas>
        </div>
    </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
